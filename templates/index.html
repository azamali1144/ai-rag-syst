<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zayan AI - Contract Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chat-bubble { max-width: 80%; word-wrap: break-word; }
        #chat-window::-webkit-scrollbar { width: 6px; }
        #chat-window::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-blue-900 text-white p-4 shadow-lg flex justify-between items-center">
        <h1 class="text-xl font-bold tracking-tight">ZAYAN <span class="text-blue-400">AI</span></h1>
        <div class="text-xs bg-blue-800 px-3 py-1 rounded-full border border-blue-700">System Online: Llama 3.2 + Qdrant</div>
    </header>

    <div class="bg-white p-4 border-b flex items-center justify-between">
        <input type="file" id="pdf-file" class="text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
        <button onclick="uploadFile()" class="bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm font-bold">Index PDF</button>
    </div>

    <!-- Chat Area -->
    <div id="chat-window" class="flex-1 overflow-y-auto p-6 space-y-4">
        <div class="bg-blue-100 text-blue-800 p-3 rounded-lg chat-bubble shadow-sm">
            Hello! I am the Zayan AI Assistant. Upload a contract to begin our analysis.
        </div>
    </div>

    <!-- Input Area -->
    <div class="p-4 bg-white border-t border-slate-200 shadow-2xl">
        <div class="max-w-4xl mx-auto flex gap-4">
            <input type="text" id="user-input" placeholder="Ask a question about the contract..." 
                   class="flex-1 p-3 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button onclick="askAI()" id="send-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-xl transition-all font-semibold">
                Ask
            </button>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');

        async function askAI() {
            const query = userInput.value;
            if (!query) return;

            // Add User Message
            appendMessage('user', query);
            userInput.value = '';

            // Prep AI Message Container
            const aiMsgDiv = appendMessage('ai', '...');
            let fullContent = "";

            // Stream from FastAPI
            const response = await fetch(`/ask?query=${encodeURIComponent(query)}`);
            const reader = response.body.getReader();
            const decoder = new TextDecoder();

            while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                const chunk = decoder.decode(value, { stream: true });
                fullContent += chunk;
                aiMsgDiv.innerText = fullContent;
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }
        }

        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.className = role === 'user' 
                ? 'bg-slate-200 text-slate-800 p-3 rounded-lg chat-bubble self-end ml-auto shadow-sm'
                : 'bg-white border border-slate-200 text-slate-800 p-3 rounded-lg chat-bubble shadow-sm';
            div.innerText = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return div;
        }
        
        async function uploadFile() {
            const fileInput = document.getElementById('pdf-file');
            if (!fileInput.files[0]) return alert("Select a PDF first");

            const formData = new FormData();
            formData.append("file", fileInput.files[0]);

            const res = await fetch('/upload', { method: 'POST', body: formData });
            const data = await res.json();
            alert(data.message);
        }
    </script>
</body>
</html>
